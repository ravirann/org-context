<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Org Context — context engineering platform" />
    <title>Org Context</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var raw = localStorage.getItem("org-context-theme");
          var theme = raw ? JSON.parse(raw).state.theme : "system";
          var dark =
            theme === "dark" ||
            (theme !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          /* default to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
