name: org-context

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ce
      POSTGRES_PASSWORD: ce
      POSTGRES_DB: context_engine
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ce -d context_engine"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: &backend_env
      CE_DATABASE_URL: postgresql+asyncpg://ce:ce@db:5432/context_engine
      CE_REDIS_URL: redis://redis:6379/0
      CE_ENV: docker
      CE_SECRET_KEY: ${CE_SECRET_KEY:-dev-secret-change-me}
      CE_AUTH_MODE: ${CE_AUTH_MODE:-demo}
      CE_CORS_ORIGINS: http://localhost:${CE_UI_PORT:-8080},http://localhost:5173
    ports:
      # Override with CE_API_PORT if host :8000 is taken (UI build arg must match).
      - "${CE_API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/scripts/start-api.sh"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/scripts/start-worker.sh"]

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/scripts/start-scheduler.sh"]

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${CE_API_PORT:-8000}
    ports:
      # Override with CE_UI_PORT if host :8080 is taken.
      - "${CE_UI_PORT:-8080}:80"
    depends_on:
      - api

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm"]
    ports:
      - "8081:8080"
    volumes:
      - ./backend/keycloak:/opt/keycloak/data/import:ro

volumes:
  pgdata:
